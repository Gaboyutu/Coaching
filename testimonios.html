<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamesense | Deja tu Opinión</title>
    <style>
        :root { --discord-bg: #313338; --discord-text: #dbdee1; --discord-green: #2ecc71; --card: #1e1f22; --primary: #5865f2; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--discord-bg); color: var(--discord-text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 500px; border: 1px solid #232428; text-align: center; }
        h1 { color: #f8fafc; font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; }
        label { display: block; text-align: left; margin: 15px 0 5px; font-size: 0.8rem; color: #94a3b8; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1e1f22; background: #313338; color: white; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; font-family: inherit; }
        textarea { height: 120px; resize: none; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #4752c4; }
        
        /* Vista previa estilo Discord */
        .discord-preview { background: var(--discord-bg); border-radius: 10px; text-align: left; padding: 15px; margin-top: 25px; border: 1px solid #232428; display: none; }
        .embed-sim { border-left: 4px solid var(--discord-green); background: #2b2d31; padding: 12px; margin-top: 10px; border-radius: 4px; }
        .embed-title { color: white; font-weight: bold; margin-bottom: 5px; font-size: 1rem; }
        .embed-desc { font-size: 0.9rem; color: #dbdee1; line-height: 1.4; }
