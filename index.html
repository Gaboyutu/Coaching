        const horas_mar_jue = ["17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "19:50"];

        function actualizarHoras() {
            const diaSelect = document.getElementById('dia');
            const horaSelect = document.getElementById('hora');
            const diaElegido = diaSelect.value;

            // Limpiar horas anteriores
            horaSelect.innerHTML = '<option value="">-- Elige hora --</option>';
            horaSelect.disabled = true;

            if (diaElegido === "") return;

            let horasDisponibles = [];
            if (diaElegido === "Lunes" || diaElegido === "Miércoles") {
                horasDisponibles = horas_lun_mie;
            } else if (diaElegido === "Martes" || diaElegido === "Jueves") {
                horasDisponibles = horas_mar_jue;
            }

            // Añadir las horas al selector
            horasDisponibles.forEach(hora => {
                const option = document.createElement('option');
                option.value = hora;
                option.textContent = hora;
                horaSelect.appendChild(option);
            });

            horaSelect.disabled = false;
        }
