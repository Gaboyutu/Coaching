<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Coaching | Reserva</title>
    <style>
        :root { --primary: #7c3aed; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #334155; text-align: center; }
        h1 { color: #a78bfa; font-size: 1.6rem; margin-bottom: 20px; }
        label { display: block; text-align: left; margin: 10px 0 5px; font-size: 0.8rem; color: #94a3b8; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #6d28d9; }
        .info-finde { background: #334155; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-top: 15px; border-left: 4px solid #fbbf24; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>RESERVA TU CLASE 🎯</h1>
    
    <label>1. ELIGE TU PLAN</label>
    <select id="plan">
        <option value="Clase Gratis (10min)">🎁 CLASE GRATIS (10 Min)</option>
        <option value="Teoría (2€)">📚 SOLO TEORÍA - 2€</option>
        <option value="Live Coaching (5€)">🎮 LIVE COACHING - 5€</option>
        <option value="Pack Pro (8,50€)">🔥 PACK PRO - 8,50€</option>
    </select>

    <label>2. ELIGE EL DÍA</label>
    <select id="dia" onchange="cambioDia()">
        <option value="">-- Selecciona un día --</option>
        <option value="Lunes">Lunes</option>
        <option value="Martes">Martes</option>
        <option value="Miércoles">Miércoles</option>
        <option value="Jueves">Jueves</option>
    </select>

    <label>3. ELIGE LA HORA (ESP)</label>
    <select id="hora" disabled>
        <option value="">-- Selecciona el día primero --</option>
    </select>

    <label>4. TU DISCORD</label>
    <input type="text" id="discord_user" placeholder="Ej: gabo#1234">

    <button onclick="enviar()">RESERVAR AHORA</button>

    <div class="info-finde">
        <b>📅 ¿Quieres fin de semana?</b><br>
        Los findes no tienen horario fijo. Elige cualquier día y dime en Discord: <i>"Quiero hacerlo el sábado/domingo"</i> y lo cuadramos.
    </div>
</div>
